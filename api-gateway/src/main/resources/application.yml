server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/fx}
    web:
      pageable:
        default-page-size: 20
        max-page-size: 500
        one-indexed-parameters: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
