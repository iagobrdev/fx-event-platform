server:
  port: 8081

spring:
  application:
    name: exchange-rate-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

fx:
  kafka:
    topic: exchange-rate-events
  awesome-api:
    available-json-url: https://economia.awesomeapi.com.br/json/available
    last-quotes-base-url: https://economia.awesomeapi.com.br/json/last/
    token: ${FX_AWESOME_API_TOKEN:}
  poll:
    api-interval-ms: 30000
    max-pairs: 500
    available-refresh-minutes: 360

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
